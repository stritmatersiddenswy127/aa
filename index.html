이미지클릭시 이동할 홈페이지 주소는 https://sbs155.com/
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>퀄리티 좋은 쇼핑몰</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Pretendard', sans-serif;
    }

    body{
      background:#f4f4f4;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .container{
      text-align:center;
    }

    h1{
      font-size:42px;
      color:#222;
      margin-bottom:30px;
      font-weight:700;
    }

    .shop-image{
      width:500px;
      max-width:90%;
      overflow:hidden;
      border-radius:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
      transition:0.3s;
    }

    .shop-image:hover{
      transform:scale(1.03);
    }

    .shop-image img{
      width:100%;
      display:block;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>퀄리티 좋은 쇼핑몰</h1>

    <!-- 이미지 클릭 시 홈페이지 이동 -->
    <a href="https://sbs155.com/" target="_blank">
      <div class="shop-image">
        <img src="쇼핑몰.png" alt="쇼핑몰 이미지">
      </div>
    </a>
  </div>

</body>
</html>
