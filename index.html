<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>퀄리티 좋은 쇼핑몰</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body{
      background:#f4f4f4;
      font-family:'Pretendard', sans-serif;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:500px;
      text-align:center;
    }

    h1{
      font-size:clamp(28px, 6vw, 42px);
      color:#222;
      margin-bottom:25px;
      font-weight:700;
      line-height:1.3;
    }

    .shop-link{
      display:block;
      text-decoration:none;
    }

    .shop-image{
      width:100%;
      overflow:hidden;
      border-radius:22px;
      background:#fff;
      box-shadow:0 8px 25px rgba(0,0,0,0.15);
      transition:transform 0.25s ease,
                 box-shadow 0.25s ease;
    }

    .shop-image:active{
      transform:scale(0.98);
    }

    .shop-image:hover{
      transform:translateY(-3px);
      box-shadow:0 12px 30px rgba(0,0,0,0.2);
    }

    .shop-image img{
      width:100%;
      height:auto;
      display:block;
      object-fit:cover;
    }

    /* 모바일 최적화 */
    @media (max-width:768px){

      body{
        padding:16px;
      }

      h1{
        margin-bottom:20px;
      }

      .shop-image{
        border-radius:18px;
      }
    }

    /* 작은 모바일 */
    @media (max-width:480px){

      body{
        padding:12px;
      }

      h1{
        font-size:26px;
      }

      .shop-image{
        border-radius:16px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>퀄리티 좋은 쇼핑몰</h1>

    <!-- 이미지 클릭 시 이동 -->
    <a class="shop-link" href="https://sbs155.com/" target="_blank">

      <div class="shop-image">
        <img src="쇼핑몰.png" alt="쇼핑몰 이미지">
      </div>

    </a>

  </div>

</body>
</html>
