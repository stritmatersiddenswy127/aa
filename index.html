<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>퀄리티 좋은 쇼핑몰</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      overflow-x: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    /* 모바일 화면 기준 최대 너비 제한 */
    .container {
      width: 100%;
      max-width: 480px;   /* 일반 스마트폰 화면에 최적화 */
      margin: 0 auto;
    }

    /* 이미지 전체 클릭 시 전화 연결 */
    .call-link {
      display: block;
      width: 100%;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }

    .call-link img {
      display: block;
      width: 100%;
      height: auto;
      border: 0;
    }

    /* 터치 시 살짝 어두워지는 효과 */
    .call-link:active {
      opacity: 0.95;
    }

    /* 태블릿 이상에서는 가운데 정렬 */
    @media (min-width: 768px) {
      body {
        padding: 20px 0;
      }

      .container {
        max-width: 480px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="https://sbs155.com/">홈페이지 바로가기</a>
      <img src="쇼핑몰.png"/>
    </a>
  </div>
</body>
</html>
